<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recorder Expert</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background-color: #111111; color: #e1e1e1; font-family: Roboto, sans-serif; overflow: hidden; }
        .ha-header { background-color: #202020; border-bottom: 1px solid #383838; }
        .ha-sidebar { background-color: #1c1c1c; border-right: 1px solid #383838; transition: width 0.3s; }
        .ha-row { border-bottom: 1px solid #282828; }
        .ha-row:hover { background-color: #2a2a2a; }
        .ha-group { background-color: #1c1c1c; border-bottom: 1px solid #282828; cursor: pointer; }
        .ha-group:hover { background-color: #242424; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="root">
        <div style="padding: 20px; color: #888;">Loading interface...</div>
    </div>
    <script type="text/babel" src="./app.jsx"></script>
</body>
</html>
